[package]
edition = "2024"

name = "credence-lib"
description = "An unfussy web server designed for straightforward authoring and scalable performance"
version = "0.0.6"
rust-version = "1.93"

license = "MIT OR Apache-2.0"
repository = "https://github.com/tliron/credence"
documentation = "https://docs.rs/credence-lib"
authors = ["Tal Liron"]

readme = "../README.md"

categories = ["web-programming::http-server"] # https://crates.io/category_slugs
keywords = ["web", "axum", "tower"]

[dependencies]
axum = "0.8.8"
axum-server = { version = "0.8.0", features = ["tls-rustls"] }
build-info = "0.0.42"
chrono = "0.4.43"
compris = { version = "=0.0.11", default-features = false, features = [
    "derive",
    "serde",
    "yaml",
    "json",
] }
dateparser = "0.2.1"
depiction = { version = "=0.0.1", features = ["derive"] }
derive_more = "2.1.1"
duration-str = "0.18.0"
dynosaur = "0.3.0"
httpdate = "1.0.3"
kutil = { version = "=0.0.5", features = [
    "http",
    "io",
    "acme",
    "axum",
    "file",
    "tls",
    "immutable",
] }
markdown = "1.0.0"
minijinja = { version = "2.14.0", features = [
    "loader",
    "unicode",
    "json",
    "urlencode",
    "loop_controls",
    "speedups",
] }
minijinja-contrib = { version = "2.14.0", features = [
    "datetime",
    "rand",
    "time",
    "timezone",
    "unicode_categories",
    "unicode_wordwrap",
    "wordcount",
    "wordwrap",
] }
moka = { version = "0.12.13", features = ["future"] }
notify = "8.2.0"
problemo = "=0.0.7"
regex = "1.12.2"
serde = "1.0.228"
tracing = "0.1.44"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "signal"] }
tokio-util = "0.7.18"
tower-http = { version = "0.6.8", features = [
    "fs",
    "limit",
    "timeout",
    "trace",
] }
tower-http-response-cache = { version = "0.0.1", features = ["axum", "moka"] }

[build-dependencies]
build-info-build = "0.0.42"

# https://stackoverflow.com/a/61417700
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
