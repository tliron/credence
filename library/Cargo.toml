[package]
edition = "2024"

name = "credence-lib"
description = "An unfussy web server designed for straightforward authoring and scalable performance"
version = "0.0.6"
rust-version = "1.91"

license = "MIT OR Apache-2.0"
repository = "https://github.com/tliron/credence"
documentation = "https://docs.rs/credence-lib"
authors = ["Tal Liron"]

readme = "../README.md"

categories = [
    "web-programming",
    "web-programming::http-server",
] # https://crates.io/category_slugs
keywords = ["web", "axum", "tower"]

[dependencies]
axum = "0.8.7"
axum-server = { version = "0.7.3", features = ["tls-rustls"] }
build-info = "0.0.42"
chrono = "0.4.42"
compris = { version = "=0.0.11", default-features = false, features = [
    "derive",
    "serde",
    "yaml",
    "json",
] }
dateparser = "0.2.1"
depiction = { version = "=0.0.1", features = ["derive"] }
duration-str = "0.17.0"
dynosaur = "0.3.0"
http = "1.4.0"
httpdate = "1.0.3"
# temporary hack: axum breaks with hyper >1.6.0
kutil = { version = "=0.0.5", features = [
    "http",
    "io",
    "acme",
    "axum",
    "file",
    "moka",
    "tls",
    "immutable",
] }
markdown = "1.0.0"
minijinja = { version = "2.12.0", features = [
    "loader",
    "unicode",
    "json",
    "urlencode",
    "loop_controls",
    "speedups",
] }
minijinja-contrib = { version = "2.12.0", features = [
    "datetime",
    "rand",
    "time",
    "timezone",
    "unicode_categories",
    "unicode_wordwrap",
    "wordcount",
    "wordwrap",
] }
moka = { version = "0.12.11", features = ["future"] }
notify = "8.2.0"
regex = "1.12.2"
serde = "1.0.228"
thiserror = "2.0.17"
tracing = "0.1.41"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "signal"] }
tokio-util = "0.7.17"
tower-http = { version = "0.6.7", features = [
    "fs",
    "limit",
    "timeout",
    "trace",
] }

[build-dependencies]
build-info-build = "0.0.42"

# https://stackoverflow.com/a/61417700
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
